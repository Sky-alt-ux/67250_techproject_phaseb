<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="../static/script.js" defer></script>
</head>



<body onload="addYear()">
    <div class="container">

        <header class="header">
            <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo"> 
        </header>

        <nav class="nav_bar" id="myTopnav">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="buytickets.html" class="cta">Buy Tickets</a>
            <a href="javascript:void(0);" class="icon" onclick="toggleNav()">☰</a>
        </nav>

        <main class="main">
        <form>
            <label for="name">Name: (required)</label><br>
            <input type="text" id="name" name="name" required>
            <br><br>

            <label for="email">Email: (required)</label><br>
            <input type="email" id="email" name="email" required>
            <br><br>

            <label for="quantity">Ticket Quantity: (required)</label><br>
            <input type="number" id="quantity" name="quantity" required>
            <br><br>

            <button type="submit">Submit</button>
        </form>
    </main>

    <figure class="main_img"></figure>

    <footer class="footer">
         <p id="copyYear"></p>
    </footer>




    </div>
    
</body>
</html>
