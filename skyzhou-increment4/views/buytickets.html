<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Tickets</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="../static/script.js" defer></script>
</head>



<body onload="addYear()">
    <div class="container">

        <header class="header">
            <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo"> 
        </header>

        <nav class="nav_bar">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="buytickets.html" class="cta">Buy Tickets</a>
        </nav>

<main class="main">

    <h2>Buy Tickets</h2>

    <table>
        <tr>
            <th>Type</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Adult</td>
            <td>$18</td>
        </tr>
        <tr>
            <td>Student</td>
            <td>$10</td>
        </tr>
    </table>

    <br>

    <table>
        <tr>
            <th>Date</th>
            <th>Action</th>
        </tr>
        <tr>
            <td>April 10</td>
            <td><button onclick="showForm('April 10')">Buy Now</button></td>
        </tr>
        <tr>
            <td>April 15</td>
            <td><button onclick="showForm('April 15')">Buy Now</button></td>
        </tr>
        <tr>
            <td>April 20</td>
            <td><button onclick="showForm('April 20')">Buy Now</button></td>
        </tr>
    </table>

    <form id="ticketForm">
        <h3>Purchase Tickets</h3>

        <label>Name:</label><br>
        <input type="text"><br><br>

        <label>Email:</label><br>
        <input type="email"><br><br>

        <label>Number of Tickets:</label><br>
        <input type="number"><br><br>

        <label>Date:</label><br>
        <input type="text" id="selectedDate" readonly><br><br>

        <button type="button" onclick="submitForm()">Submit</button>
    </form>

</main>

    <figure class="main_img"></figure>

    <footer class="footer">
         <p id="copyYear"></p>
    </footer>




    </div>
    
</body>
</html>
